server {
    listen 8080; # Unprivileged ports must be > 1024
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 1. GZIP COMPRESSION
    # Dramatically reduces the size of your JS and CSS files over the network
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # 2. REACT ROUTER FIX (SPA Routing)
    # If a file isn't found, fallback to index.html so React Router can take over
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 3. STATIC ASSET CACHING
    # Tells browsers to keep images, css, and js in their local cache for 6 months
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}